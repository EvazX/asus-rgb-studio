<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RGB Test Patterns</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --fg: #f3f6fb;
      --muted: #93a0b5;
      --panel: #0d1320;
      --accent: #5eead4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top, #10192b, var(--bg) 55%);
      color: var(--fg);
    }
    .controls {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      padding: 14px;
      background: rgba(5, 7, 11, 0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--panel);
      color: var(--fg);
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: transform 120ms ease, border-color 120ms ease;
    }
    button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }
    .hint {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 13px;
    }
    #stage {
      height: calc(100vh - 120px);
      min-height: 500px;
    }
    .solid {
      width: 100%;
      height: 100%;
    }
    .four-zones {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: 100%;
      height: 100%;
    }
    .bars {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      width: 100%;
      height: 100%;
    }
    .row {
      width: 100%;
      height: 100%;
    }
    .gradient {
      width: 100%;
      height: 100%;
      background-size: 100% 100%;
    }
    .label {
      position: fixed;
      right: 14px;
      bottom: 14px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 13px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button data-mode="red">Rouge</button>
    <button data-mode="green">Vert</button>
    <button data-mode="blue">Bleu</button>
    <button data-mode="white">Blanc</button>
    <button data-mode="cyberpunk">Cyberpunk</button>
    <button data-mode="sunset">Sunset</button>
    <button data-mode="rainbow4">4 zones arc-en-ciel</button>
    <button data-mode="rgbbars">Bandes RGB</button>
    <button data-mode="warmbars">Bandes chaudes</button>
    <button data-mode="duo">Gauche / droite</button>
    <button data-mode="checker">Damier dur</button>
    <button data-mode="splitpulse">Split pulse</button>
    <button data-mode="sweep">Balayage</button>
    <button data-mode="gradientmove">Gradient mouvant</button>
    <div class="hint">
      Raccourcis : <strong>1</strong> rouge, <strong>2</strong> vert, <strong>3</strong> bleu, <strong>4</strong> blanc, <strong>5</strong> cyberpunk, <strong>6</strong> sunset, <strong>7</strong> rainbow, <strong>8</strong> RGB bars, <strong>9</strong> warm bars, <strong>0</strong> gauche/droite, <strong>Q</strong> damier, <strong>W</strong> split pulse, <strong>E</strong> balayage, <strong>R</strong> gradient mouvant. Appuie sur <strong>F11</strong> pour plein écran.
    </div>
  </div>
  <div id="stage"></div>
  <div id="label" class="label">Rouge</div>

  <script>
    const stage = document.getElementById("stage");
    const label = document.getElementById("label");

    const modes = {
      red: { name: "Rouge", render: () => solid("#ff0000") },
      green: { name: "Vert", render: () => solid("#00ff00") },
      blue: { name: "Bleu", render: () => solid("#0066ff") },
      white: { name: "Blanc", render: () => solid("#ffffff") },
      cyberpunk: { name: "Cyberpunk", render: () => four(["#00ffd9", "#ff00aa", "#8f3cff", "#00c2ff"]) },
      sunset: { name: "Sunset", render: () => four(["#ff6a00", "#ff9740", "#ff4f88", "#ad2cd6"]) },
      rainbow4: { name: "4 zones arc-en-ciel", render: () => four(["#ff0000", "#ff8a00", "#00ff66", "#009dff"]) },
      rgbbars: { name: "Bandes RGB", render: () => bars(["#ff0000", "#00ff00", "#0000ff", "#ffffff", "#000000"]) },
      warmbars: { name: "Bandes chaudes", render: () => bars(["#4a1208", "#8e2a12", "#d35c17", "#ffb14a", "#fff1cc"]) },
      duo: { name: "Gauche / droite", render: () => four(["#ff0000", "#ff8a00", "#00ff66", "#009dff"]) },
      checker: { name: "Damier dur", render: () => checker() },
      splitpulse: { name: "Split pulse", render: () => splitPulse() },
      sweep: { name: "Balayage", render: () => sweep() },
      gradientmove: { name: "Gradient mouvant", render: () => movingGradient() },
    };

    let animationTimer = null;

    function stopAnimation() {
      if (animationTimer !== null) {
        clearInterval(animationTimer);
        animationTimer = null;
      }
    }

    function solid(color) {
      stage.innerHTML = `<div class="solid" style="background:${color}"></div>`;
    }

    function four(colors) {
      stage.innerHTML = `<div class="four-zones">${colors.map(color => `<div style="background:${color}"></div>`).join("")}</div>`;
    }

    function bars(colors) {
      stage.innerHTML = `<div class="bars">${colors.map(color => `<div class="row" style="background:${color}"></div>`).join("")}</div>`;
    }

    function applyMode(mode) {
      stopAnimation();
      const spec = modes[mode] || modes.red;
      spec.render();
      label.textContent = spec.name;
    }

    function checker() {
      let flip = false;
      const render = () => {
        const a = flip ? "#ff004c" : "#00e1ff";
        const b = flip ? "#14001f" : "#fff200";
        stage.innerHTML = `
          <div class="solid" style="
            background:
              linear-gradient(45deg, ${a} 25%, ${b} 25%, ${b} 50%, ${a} 50%, ${a} 75%, ${b} 75%, ${b} 100%);
            background-size: 120px 120px;
          "></div>`;
        flip = !flip;
      };
      render();
      animationTimer = setInterval(render, 220);
    }

    function splitPulse() {
      let flip = false;
      const render = () => {
        const left = flip ? ["#ff0055", "#ff8c00"] : ["#00f0ff", "#006dff"];
        const right = flip ? ["#00f0ff", "#006dff"] : ["#ff0055", "#ff8c00"];
        stage.innerHTML = `
          <div class="four-zones">
            <div style="background:${left[0]}"></div>
            <div style="background:${left[1]}"></div>
            <div style="background:${right[0]}"></div>
            <div style="background:${right[1]}"></div>
          </div>`;
        flip = !flip;
      };
      render();
      animationTimer = setInterval(render, 300);
    }

    function sweep() {
      let position = 0;
      const render = () => {
        stage.innerHTML = `
          <div class="solid" style="
            background:
              linear-gradient(90deg,
                #05070b 0%,
                #05070b ${Math.max(0, position - 8)}%,
                #ff004c ${Math.max(0, position)}%,
                #00e1ff ${Math.min(100, position + 10)}%,
                #05070b ${Math.min(100, position + 22)}%,
                #05070b 100%);
          "></div>`;
        position = (position + 6) % 120;
      };
      render();
      animationTimer = setInterval(render, 90);
    }

    function movingGradient() {
      let hue = 0;
      const render = () => {
        stage.innerHTML = `
          <div class="gradient" style="
            background:
              linear-gradient(90deg,
                hsl(${hue} 100% 50%),
                hsl(${(hue + 70) % 360} 100% 50%),
                hsl(${(hue + 160) % 360} 100% 50%),
                hsl(${(hue + 240) % 360} 100% 50%));
          "></div>`;
        hue = (hue + 12) % 360;
      };
      render();
      animationTimer = setInterval(render, 120);
    }

    document.querySelectorAll("button[data-mode]").forEach(button => {
      button.addEventListener("click", () => applyMode(button.dataset.mode));
    });

    document.addEventListener("keydown", event => {
      const map = {
        "1": "red",
        "2": "green",
        "3": "blue",
        "4": "white",
        "5": "cyberpunk",
        "6": "sunset",
        "7": "rainbow4",
        "8": "rgbbars",
        "9": "warmbars",
        "0": "duo",
        "q": "checker",
        "w": "splitpulse",
        "e": "sweep",
        "r": "gradientmove",
      };
      if (map[event.key]) {
        applyMode(map[event.key]);
      }
    });

    applyMode("red");
  </script>
</body>
</html>
